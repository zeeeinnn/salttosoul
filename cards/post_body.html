<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Josefin Sans',sans-serif;
  background:radial-gradient(ellipse at 20% 80%, #3D1F0D 0%, #130A03 65%);}
.card{width:100%;height:100%;padding:80px;display:flex;flex-direction:column;justify-content:space-between;position:relative;}
.top{display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:10px;letter-spacing:0.38em;text-transform:uppercase;color:#D4BC8A;font-weight:200;}
.pill{font-size:9.5px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(212,133,90,0.9);
  border:1px solid rgba(212,133,90,0.35);border-radius:30px;padding:7px 18px;font-weight:200;}
.mid{display:flex;flex-direction:column;gap:0;position:relative;z-index:2;}
.kicker{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#D4855A;font-weight:300;margin-bottom:28px;}
.quote{font-family:'Cormorant Garamond',serif;font-size:68px;font-style:italic;font-weight:300;
  color:#F2EDE4;line-height:1.2;letter-spacing:-0.01em;}
.ghost-icon{position:absolute;bottom:-30px;right:-20px;width:380px;height:380px;object-fit:contain;opacity:0.08;z-index:1;pointer-events:none;}
.bot{display:flex;align-items:center;justify-content:space-between;z-index:2;}
.handle{font-size:9.5px;letter-spacing:0.26em;color:rgba(242,237,228,0.4);text-transform:lowercase;}
.spiral{width:26px;height:26px;object-fit:contain;opacity:0.4;}
</style></head>
<body><div class="card">
  <div class="top">
    <div class="brand">Salt to Soul</div>
    <div class="pill">Movement</div>
  </div>
  <div style="position:relative;">
    <img class="ghost-icon" src="icon_flow.png" alt=""/>
    <div class="mid">
      <div class="kicker">On the body</div>
      <div class="quote">The body knows<br/>things the mind<br/>hasn't caught<br/>up to yet.</div>
    </div>
  </div>
  <div class="bot">
    <div class="handle">salttosoul.mv</div>
    <img class="spiral" src="icon_release.png" alt=""/>
  </div>
</div></body></html>
