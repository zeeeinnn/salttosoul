<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <rect width="100" height="100" fill="#D9957A"/>
  <g fill="none" stroke="#182415" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- head -->
    <circle cx="50" cy="21" r="7"/>
    <!-- spine -->
    <path d="M 50,28 L 50,62"/>
    <!-- standing leg -->
    <path d="M 50,62 L 50,84"/>
    <!-- raised bent leg (foot to inner thigh) -->
    <path d="M 50,50 C 43,53 40,60 42,67 C 46,66 50,58 50,50"/>
    <!-- arms raised in prayer/namaste above -->
    <path d="M 50,40 L 33,25"/>
    <path d="M 50,40 L 67,25"/>
  </g>
</svg>