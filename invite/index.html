<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Salt to Soul — you're invited</title>
<meta name="description" content="Golden Hour — the Salt to Soul launch. Saturday 18 July.">
<meta property="og:title" content="Salt to Soul — you're invited">
<meta property="og:description" content="Golden Hour — the Salt to Soul launch. Saturday 18 July, 5:15pm.">
<meta property="og:type" content="website">
<link rel="icon" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Josefin+Sans:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#343D25; --palm:#906342; --terra:#906342; --gold:#85AC72;
    --blush:#BABECC; --sage:#906342; --atoll:#906342; --pandan:#C7D3E1;
    --salt:#E9E6DB; --shore:#EAE0AE;
    --card:#FBF8F2;
    --kraft:#A85843; --kraft-paper:#B89380; --ink:#37342F;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Josefin Sans',system-ui,sans-serif;
    --script:'Alex Brush',cursive;
    --mono:'Courier Prime',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--kraft);
    color:var(--palm);
    font-family:var(--sans);font-weight:400;
    min-height:100svh;overflow-x:hidden;
  }
  :focus-visible{outline:2px solid var(--terra);outline-offset:3px}

  .stage{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:clamp(2rem,8vw,4rem) 1.1rem;
    overflow-y:auto;
  }
  #iconsStage, #greetStage{
    transition:opacity 1.8s cubic-bezier(.4,0,.2,1), transform 2s cubic-bezier(.4,0,.2,1), filter 1.8s ease;
  }
  #iconsStage{z-index:3;background:var(--kraft)}
  #greetStage{z-index:2;opacity:0;pointer-events:none;background:var(--kraft)}
  #greetStage.show{opacity:1;pointer-events:auto}
  .stage.gone{
    opacity:0;filter:blur(6px);
    transform:scale(1.06);
    pointer-events:none;
  }
  #iconsStage.gone, #greetStage.gone{
    opacity:0;pointer-events:none;
  }
  /* the real mottled rust-grain photographed off your Canva export —
     tiled, since a flat colour or fake CSS noise both read as too clean
     next to the actual artwork's texture */
  #iconsStage::before, #greetStage::before, #inviteStage::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:url("../brand/icon/dance2/IMG_8950.jpeg");
    background-size:400px 200px;background-repeat:repeat;
  }
  .stage-foot{
    position:absolute;left:0;right:0;bottom:clamp(2.5rem,9vh,4.5rem);text-align:center;
    font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--salt);opacity:.8;
  }
  /* a brief "tap to continue" affordance — fades in, holds, fades out
     over ~2s, so it doesn't just sit there competing with the icons/type */
  .tap-hint{
    position:absolute;left:0;right:0;bottom:clamp(6.5rem,17vh,8.5rem);
    text-align:center;pointer-events:none;
    font-family:var(--mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--salt);opacity:0;
  }
  .tap-hint .ripple{
    display:block;position:relative;width:13px;height:13px;margin:0 auto .55rem;
    border:1px solid var(--salt);border-radius:50%;
  }
  .tap-hint .ripple::before{
    content:'';position:absolute;inset:0;border:1px solid var(--salt);border-radius:50%;
    animation:tapRipple 1.1s ease-out infinite;
  }
  @keyframes tapRipple{
    0%{transform:scale(1);opacity:.8}
    100%{transform:scale(2.3);opacity:0}
  }
  @keyframes tapHintShow{
    0%{opacity:0} 15%{opacity:.8} 75%{opacity:.8} 100%{opacity:0}
  }
  #iconsStage.playing .tap-hint{animation:tapHintShow 2s ease both;animation-delay:1.3s}
  #greetStage.show .tap-hint{animation:tapHintShow 2s ease both;animation-delay:1.6s}

  /* ── STAGE 1 : the brand icons arrive and dance ────────────────── */
  .icons-ring{position:relative;width:min(78vw,340px);aspect-ratio:1080/1350}
  .icon-el{
    position:absolute;width:26%;opacity:0;
    transform:translate(-50%,-50%) scale(.2);
  }
  .icon-el.spiral{left:51.2%;top:50.2%;width:23.5%}
  .icon-el.top   {left:50.9%;top:26.9%;width:26.5%}
  .icon-el.right {left:75.2%;top:48.5%;width:21%}
  .icon-el.green {left:68.1%;top:70.7%;width:18%}
  .icon-el.gold  {left:30.8%;top:68.9%;width:23.5%}
  .icon-el.teal  {left:24.8%;top:43.3%;width:20%}

  #iconsStage.playing .icon-el{
    animation:iconIn .75s cubic-bezier(.34,1.5,.64,1) both,
              iconDance 2.6s ease-in-out infinite;
  }
  #iconsStage.playing .icon-el.spiral{ animation-delay:0s,   .75s }
  #iconsStage.playing .icon-el.top   { animation-delay:.1s,  .85s }
  #iconsStage.playing .icon-el.right { animation-delay:.2s,  .95s }
  #iconsStage.playing .icon-el.green { animation-delay:.3s, 1.05s }
  #iconsStage.playing .icon-el.gold  { animation-delay:.4s, 1.15s }
  #iconsStage.playing .icon-el.teal  { animation-delay:.5s, 1.25s }

  @keyframes iconIn{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-20deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1.14) rotate(6deg)}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
  }
  @keyframes iconDance{
    0%,100%{transform:translate(-50%,-50%) scale(1) rotate(0deg) translateY(0)}
    25%{transform:translate(-50%,-50%) scale(1.06) rotate(-5deg) translateY(-7%)}
    50%{transform:translate(-50%,-50%) scale(.96) rotate(4deg) translateY(3%)}
    75%{transform:translate(-50%,-50%) scale(1.05) rotate(-3deg) translateY(-5%)}
  }

  /* ── STAGE 2 : the greeting — your actual Canva artwork, full-bleed ─ */
  .greet-img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    opacity:0;transform:scale(1.04);
  }
  #greetStage.show .greet-img{
    opacity:1;transform:scale(1);
    transition:opacity 1.6s cubic-bezier(.16,1,.3,1) .2s, transform 2.2s cubic-bezier(.16,1,.3,1) .2s;
  }

  /* ── STAGE 3 : the invite — your actual Canva design ───────────── */
  #inviteStage{
    z-index:1;opacity:0;pointer-events:none;
    transform:scale(1.06);background:var(--kraft);
    /* the card + RSVP together can run taller than the viewport — start
       from the top so the binder clip never gets centred off-screen */
    align-items:flex-start;
  }
  #inviteStage.show{
    opacity:1;pointer-events:auto;transform:scale(1);
    /* a slow focus-pull settle, no bounce — the image arriving into focus */
    transition:opacity 1.8s cubic-bezier(.16,1,.3,1) .5s,
               transform 2.4s cubic-bezier(.16,1,.3,1) .5s;
  }
  /* a soft, continuous vignette over the whole invite stage so the card
     and the RSVP section read as one surface, not two flat blocks —
     the eye otherwise perceives the plain colour differently next to
     the busy card vs. next to plain type, even though it's one colour */
  #inviteStage::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(140% 90% at 50% 20%, rgba(0,0,0,0) 0%, rgba(20,10,6,.16) 100%);
  }
  #inviteStage .scroll-hint{z-index:1}
  .invite-wrap{position:relative;z-index:1}

  .invite-wrap{width:min(92vw,440px)}

  .invite-image{position:relative;width:100%}
  .invite-image img{
    width:100%;display:block;
    box-shadow:0 30px 60px rgba(46,26,14,.3), 0 4px 14px rgba(46,26,14,.16);
  }

  /* the RSVP panel — the same real kraft paper as the envelope, a quiet
     continuation of the stationery rather than a web form bolted on */
  .rsvp-panel{
    position:relative;
    background:var(--kraft);
    padding:2.6rem 2rem 2.2rem;
    text-align:center;
    box-shadow:0 20px 40px rgba(46,26,14,.24);
    opacity:0;transform:translateY(14px);
  }
  .rsvp-panel::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:url("../brand/icon/dance2/IMG_8950.jpeg");
    background-size:400px 200px;background-repeat:repeat;
  }
  #inviteStage.show .rsvp-panel{
    opacity:1;transform:translateY(0);
    transition:opacity 1.3s ease 2.3s, transform 1.4s cubic-bezier(.16,1,.3,1) 2.3s;
  }
  .scroll-hint{
    position:absolute;left:0;right:0;bottom:1rem;text-align:center;
    font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--salt);opacity:0;pointer-events:none;
  }
  .scroll-hint .arrow{display:block;font-size:1rem;line-height:1;margin-top:.35rem;animation:hintBob 1.4s ease-in-out infinite}
  @keyframes hintBob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  #inviteStage.show.scrollable .scroll-hint{opacity:.85;transition:opacity 1s ease .9s}
  #inviteStage.show.scrollable.scrolled .scroll-hint{opacity:0;transition:opacity .15s ease}
  .rsvp-q{
    position:relative;font-family:var(--script);font-weight:400;
    font-size:2.1rem;line-height:1;
    color:var(--card);margin-bottom:1.6rem;
  }
  .btns{position:relative;display:flex;flex-direction:column;align-items:center;gap:1.1rem}
  button{cursor:pointer;transition:all .25s ease}
  .btn-yes{
    background:transparent;color:var(--card);
    border:1px solid rgba(252,248,242,.6);
    padding:.9rem 2.4rem;
    font-family:var(--mono);font-weight:400;
    font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;
  }
  .btn-yes:hover{background:rgba(252,248,242,.12);border-color:var(--card)}
  .btn-no{
    background:none;border:none;color:var(--card);opacity:.75;
    font-family:var(--serif);font-style:italic;font-weight:500;font-size:1rem;
    padding:.2rem;border-bottom:1px solid rgba(252,248,242,.35);
  }
  .btn-no:hover{opacity:1}

  @keyframes rise{
    from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)}
  }
  .form{position:relative;display:none;margin-top:1.3rem;text-align:left;width:100%}
  .form.show{display:block;animation:rise .5s ease forwards}
  .field{margin-bottom:.9rem}
  label{
    display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--card);opacity:.8;margin-bottom:.45rem;
  }
  input{
    width:100%;padding:.8rem .85rem;background:var(--card);
    border:1px solid rgba(46,26,14,.15);
    font-family:var(--serif);font-size:1.05rem;color:var(--night);
  }
  input:focus{outline:none;border-color:var(--night)}
  .form .btn-yes{width:100%;margin-top:.4rem;background:var(--card);color:var(--kraft);border-color:var(--card)}
  .form .btn-yes:hover{background:var(--night);color:var(--card);border-color:var(--night)}

  .done{position:relative;display:none;padding:.6rem 0}
  .done.show{display:block;animation:rise .6s ease forwards}
  .done h3{font-family:var(--script);font-weight:400;font-size:2.3rem;color:var(--card);margin-bottom:.5rem}
  .done p{font-family:var(--serif);font-style:italic;font-size:1.02rem;color:var(--card);opacity:.92;line-height:1.6}
  .cal{
    display:inline-block;margin-top:1.2rem;
    font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
    color:var(--card);text-decoration:none;opacity:.8;
    border-bottom:1px solid rgba(252,248,242,.35);padding-bottom:.25rem;
  }
  .err{color:#3a1810;background:rgba(255,255,255,.9);padding:.5rem .7rem;font-size:.8rem;margin-top:.6rem;display:none;font-family:var(--serif)}
  .err.show{display:block}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<main class="stage" id="iconsStage" role="button" tabindex="0" aria-label="Skip intro">
  <div class="icons-ring">
    <img class="icon-el spiral" src="../brand/icon/dance2/IMG_8944.png" alt="">
    <img class="icon-el top"    src="../brand/icon/dance2/IMG_8945.png" alt="">
    <img class="icon-el right"  src="../brand/icon/dance2/IMG_8946.png" alt="">
    <img class="icon-el green"  src="../brand/icon/dance2/IMG_8947.png" alt="">
    <img class="icon-el gold"   src="../brand/icon/dance2/IMG_8948.png" alt="">
    <img class="icon-el teal"   src="../brand/icon/dance2/IMG_8949.png" alt="">
  </div>
  <p class="tap-hint"><span class="ripple"></span>tap to continue</p>
  <p class="stage-foot">salttosoul.com</p>
</main>

<main class="stage" id="greetStage" role="button" tabindex="0" aria-label="Skip intro">
  <img class="greet-img" src="../photos/IMG_8951.jpeg" alt="It's finally time — and you are invited!">
  <p class="tap-hint"><span class="ripple"></span>tap to continue</p>
</main>

<main class="stage" id="inviteStage">
  <div class="invite-wrap">
    <div class="invite-image">
      <img src="../photos/IMG_8952.png" alt="Salt to Soul — Golden Hour invitation">
    </div>

    <div class="rsvp-panel" id="rsvp">
      <p class="rsvp-q" id="rsvpQ">Will you come?</p>
      <div class="btns" id="btns">
        <button class="btn-yes" id="yes">Yes — I'll be there</button>
        <button class="btn-no" id="no">I'll catch the next one</button>
      </div>

      <form class="form" id="form">
        <div class="field">
          <label for="ph">Your number</label>
          <input type="tel" id="ph" inputmode="tel" placeholder="7XX XXXX" required>
        </div>
        <div class="field">
          <label for="ig">Instagram <span style="text-transform:none;letter-spacing:0;opacity:.7">(optional)</span></label>
          <input type="text" id="ig" placeholder="@yourhandle">
        </div>
        <button type="submit" class="btn-yes" id="send">Confirm my place</button>
        <p class="err" id="err">Something went wrong — please try again.</p>
      </form>

      <div class="done" id="done">
        <h3 id="doneTitle">See you Saturday</h3>
        <p id="doneMsg">Your place is saved. Come a little early — the light is best just before six.</p>
        <a class="cal" id="cal" target="_blank" rel="noopener"
           href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Salt%20to%20Soul%20%E2%80%94%20Golden%20Hour&dates=20260718T121500Z/20260718T140000Z&details=The%20Salt%20to%20Soul%20launch.%20Live%20music%2C%20small%20bites%2C%20matcha%2C%20golden%20hour.&location=10th%20Floor%2C%20H.%20Snoopy%2C%20Asrafee%20Magu%2C%20Mal%C3%A9">
          + add to calendar
        </a>
      </div>
    </div>
  </div>
  <p class="scroll-hint" id="scrollHint">scroll for rsvp<span class="arrow">↓</span></p>
</main>

<script>
  var GUESTS = {
    dyna:'Dyna', malsa:'Malsa', kaisha:'Kaisha', bathool:'Bathool',
    shiu:'Shiu', dhafy:'Dhafy', subuhath:'Subuhath', afza:'Afza',
    babee:'Babee', zaha:'Zaha', maisha:'Maisha', isha:'Isha',
    shaf:'Shaf', hal:'Hal', fiu:'Fiu', naba:'Naba'
  };
  var FORM_ID = 'xpqnglya';

  var key  = (new URLSearchParams(location.search).get('g') || '').toLowerCase().trim();
  var name = GUESTS[key] || '';

  if (name) {
    document.title = name + ", you're invited — Salt to Soul";
    document.getElementById('rsvpQ').textContent = 'Will you come, ' + name + '?';
  }

  /* the intro is a timed sequence: icons dance in, then the greeting,
     then the invite itself — tapping any stage skips straight ahead */
  var iconsStage = document.getElementById('iconsStage'),
      greetStage = document.getElementById('greetStage'),
      inviteStage = document.getElementById('inviteStage'),
      step = 0, timer = null;

  function goToGreeting(){
    if (step >= 1) return;
    step = 1;
    clearTimeout(timer);
    iconsStage.classList.add('gone');
    greetStage.classList.add('show');
    timer = setTimeout(goToInvite, 3400);
  }
  function goToInvite(){
    if (step >= 2) return;
    step = 2;
    clearTimeout(timer);
    greetStage.classList.add('gone');
    inviteStage.classList.add('show');
    setTimeout(function(){
      if (inviteStage.scrollHeight > inviteStage.clientHeight + 10) {
        inviteStage.classList.add('scrollable');
      }
    }, 50);
  }

  iconsStage.classList.add('playing');
  timer = setTimeout(goToGreeting, 3600);

  iconsStage.addEventListener('click', goToGreeting);
  iconsStage.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goToGreeting(); }
  });
  greetStage.addEventListener('click', goToInvite);
  greetStage.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goToInvite(); }
  });

  function hideScrollHint(){ inviteStage.classList.add('scrolled'); }
  inviteStage.addEventListener('scroll', hideScrollHint, { passive:true });
  inviteStage.addEventListener('wheel', hideScrollHint, { passive:true });
  inviteStage.addEventListener('touchstart', hideScrollHint, { passive:true });

  var btns = document.getElementById('btns'), form = document.getElementById('form'),
      done = document.getElementById('done'), err = document.getElementById('err'),
      attending = 'yes';

  document.getElementById('yes').addEventListener('click', function(){
    attending = 'yes';
    btns.style.display = 'none';
    form.classList.add('show');
    document.getElementById('ph').focus();
  });

  document.getElementById('no').addEventListener('click', function(){
    attending = 'no';
    btns.style.display = 'none';
    post({ phone:'', instagram:'' });
    document.getElementById('doneTitle').textContent = 'We’ll miss you';
    document.getElementById('doneMsg').textContent   = 'Next time. Zey will send you the class schedule anyway.';
    document.getElementById('cal').style.display = 'none';
    done.classList.add('show');
    document.getElementById('rsvpQ').style.display = 'none';
  });

  function post(extra){
    return fetch('https://formspree.io/f/' + FORM_ID, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify({
        _subject : 'RSVP ' + (attending==='yes' ? '✓ YES' : '✗ no') + ' — ' + (name || 'unknown guest'),
        form     : 'Golden Hour RSVP',
        guest    : name || '(link had no name)',
        attending: attending==='yes' ? 'YES — coming' : 'No — cannot make it',
        phone    : extra.phone,
        instagram: extra.instagram
      })
    });
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var btn = document.getElementById('send');
    btn.disabled = true; btn.textContent = 'Sending…';
    err.classList.remove('show');
    post({ phone:document.getElementById('ph').value, instagram:document.getElementById('ig').value })
      .then(function(r){
        if (!r.ok) throw new Error('bad');
        form.classList.remove('show');
        done.classList.add('show');
        document.getElementById('rsvpQ').style.display = 'none';
      })
      .catch(function(){
        btn.disabled = false; btn.textContent = 'Confirm my place';
        err.classList.add('show');
      });
  });
</script>
</body>
</html>
