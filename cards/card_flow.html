<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Josefin Sans',sans-serif;
  background:radial-gradient(ellipse at 50% 40%, #C06030 0%, #7A2E10 60%, #3D1208 100%);}
.card{width:100%;height:100%;padding:80px 90px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;}
.top{display:flex;align-items:center;justify-content:space-between;width:100%;}
.brand{font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:rgba(242,237,228,0.45);font-weight:200;}
.dot{width:3px;height:3px;border-radius:50%;background:rgba(242,237,228,0.3);}
.theme{font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:rgba(242,237,228,0.45);font-weight:200;}
.mid{display:flex;flex-direction:column;align-items:center;gap:0;flex:1;justify-content:center;}
.icon{width:340px;height:340px;object-fit:contain;margin-bottom:52px;filter:drop-shadow(0 0 50px rgba(242,237,228,0.18));}
.rule{width:36px;height:1px;background:rgba(242,237,228,0.3);margin-bottom:40px;}
.quote{font-family:'Cormorant Garamond',serif;font-size:38px;font-style:italic;font-weight:300;
  color:#F2EDE4;line-height:1.72;text-align:center;max-width:800px;letter-spacing:0.01em;}
.bot{font-size:9px;letter-spacing:0.3em;color:rgba(242,237,228,0.2);text-transform:lowercase;}
</style></head>
<body><div class="card">
  <div class="top"><div class="brand">Salt to Soul</div><div class="dot"></div><div class="theme">Flow</div></div>
  <div class="mid">
    <img class="icon" src="icon_flow.png" alt=""/>
    <div class="rule"></div>
    <div class="quote">Life moves more gracefully when you stop trying to steer every current.</div>
  </div>
  <div class="bot">salttosoul.mv</div>
</div></body></html>
