<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Josefin Sans',sans-serif;
  background:radial-gradient(ellipse at 70% 25%, #C06030 0%, #5A1A06 45%, #1A0804 85%);}
.card{width:100%;height:100%;padding:80px;display:flex;flex-direction:column;justify-content:space-between;}
.top{display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:10px;letter-spacing:0.38em;text-transform:uppercase;color:rgba(242,237,228,0.6);font-weight:200;}
.pill{font-size:9.5px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(242,237,228,0.8);
  border:1px solid rgba(242,237,228,0.25);border-radius:30px;padding:7px 18px;font-weight:200;}
.mid{display:flex;flex-direction:column;align-items:center;gap:44px;flex:1;justify-content:center;}
.icon-wrap{display:flex;align-items:center;justify-content:center;}
.icon{width:200px;height:200px;object-fit:contain;filter:drop-shadow(0 0 50px rgba(242,237,228,0.12));}
.text-block{display:flex;flex-direction:column;align-items:center;gap:20px;}
.rule{width:44px;height:1px;background:rgba(242,237,228,0.3);}
.quote{font-family:'Cormorant Garamond',serif;font-size:46px;font-style:italic;font-weight:300;
  color:#F2EDE4;line-height:1.5;text-align:center;max-width:820px;}
.bot{display:flex;align-items:center;justify-content:center;}
.handle{font-size:9.5px;letter-spacing:0.26em;color:rgba(242,237,228,0.35);text-transform:lowercase;}
</style></head>
<body><div class="card">
  <div class="top">
    <div class="brand">Salt to Soul</div>
    <div class="pill">Stillness</div>
  </div>
  <div class="mid">
    <div class="icon-wrap">
      <img class="icon" src="icon_surrender.png" alt=""/>
    </div>
    <div class="text-block">
      <div class="rule"></div>
      <div class="quote">Stillness is not<br/>the absence of movement.<br/>It's movement<br/>finally arriving home.</div>
      <div class="rule"></div>
    </div>
  </div>
  <div class="bot">
    <div class="handle">salttosoul.mv</div>
  </div>
</div></body></html>
