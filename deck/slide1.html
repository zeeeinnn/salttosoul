<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1280px;height:720px;overflow:hidden;background:radial-gradient(ellipse at 35% 50%, #3D1F0D 0%, #180C04 100%);font-family:'Josefin Sans',sans-serif;}
.slide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:70px 90px;}
.left{flex:1;display:flex;flex-direction:column;gap:0;}
.eyebrow{font-size:11px;letter-spacing:0.38em;text-transform:uppercase;color:#C7D3E1;font-weight:200;margin-bottom:22px;}
h1{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:600;color:#E9E6DB;line-height:1.1;margin-bottom:28px;}
h1 span{color:#BABECC;font-style:italic;font-weight:300;}
.sub{font-size:15px;letter-spacing:0.08em;color:#E9E6DB;font-weight:200;line-height:1.8;max-width:440px;}
.rule{width:40px;height:1px;background:#C7D3E1;opacity:0.4;margin:32px 0;}
.tag{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:#C7D3E1;font-weight:200;}
.right{width:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;position:relative;}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
.spiral{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 0 30px rgba(212,188,138,0.55));}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#E9E6DB;}
.logo-tag{font-size:9.5px;letter-spacing:0.26em;color:#C7D3E1;font-weight:200;text-transform:lowercase;}
.vert-rule{position:absolute;left:0;top:10%;height:80%;width:1px;background:linear-gradient(to bottom,transparent,rgba(212,188,138,0.2),transparent);}
</style></head>
<body><div class="slide">
  <div class="left">
    <div class="eyebrow">The plan — simply put</div>
    <h1>What Salt to Soul<br/><span>could become.</span></h1>
    <div class="rule"></div>
    <div class="sub">You already have the space, the training, and the view.<br/>This is just the map.</div>
    <div class="rule"></div>
    <div class="tag">Prepared with love · 2026</div>
  </div>
  <div class="right">
    <div class="vert-rule"></div>
    <div class="logo-wrap">
      <img class="spiral" src="spiral_gold.png" alt=""/>
      <div class="logo-name">Salt to Soul</div>
      <div class="logo-tag">a journey from doing to being</div>
    </div>
  </div>
</div></body></html>
