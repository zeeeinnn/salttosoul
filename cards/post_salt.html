<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Josefin Sans',sans-serif;
  background:radial-gradient(ellipse at 50% 50%, #5A2E14 0%, #2A1008 60%, #0E0604 100%);}
.card{width:100%;height:100%;padding:80px;display:flex;flex-direction:column;justify-content:space-between;position:relative;}
.top{display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:10px;letter-spacing:0.38em;text-transform:uppercase;color:#E4E7CB;font-weight:200;}
.pill{font-size:9.5px;letter-spacing:0.3em;text-transform:uppercase;color:#E4E7CB;
  border:1px solid rgba(212,188,138,0.6);border-radius:30px;padding:7px 18px;font-weight:200;}
.mid{flex:1;display:flex;align-items:flex-end;padding-bottom:20px;}
.text-col{display:flex;flex-direction:column;gap:32px;max-width:680px;}
.line{display:flex;flex-direction:column;gap:8px;}
.line-label{font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:#BABECC;font-weight:300;}
.line-text{font-family:'Cormorant Garamond',serif;font-size:72px;font-style:italic;font-weight:300;
  color:#E9E6DB;line-height:1.05;letter-spacing:-0.01em;}
.icon-right{position:absolute;right:60px;top:50%;transform:translateY(-50%);
  width:280px;height:280px;object-fit:contain;opacity:0.32;filter:drop-shadow(0 0 40px rgba(212,188,138,0.25)) brightness(1.1);}
.bot{display:flex;align-items:center;justify-content:space-between;}
.handle{font-size:9.5px;letter-spacing:0.26em;color:#E4E7CB;text-transform:lowercase;}
.tagline{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:#E4E7CB;letter-spacing:0.04em;}
</style></head>
<body><div class="card">
  <div class="top">
    <div class="brand">Salt to Soul</div>
    <div class="pill">The Islands</div>
  </div>
  <img class="icon-right" src="icon_surrender.png" alt=""/>
  <div class="mid">
    <div class="text-col">
      <div class="line">
        <div class="line-label">Salt</div>
        <div class="line-text">in the air.</div>
      </div>
      <div class="line">
        <div class="line-label">Stillness</div>
        <div class="line-text">in the body.</div>
      </div>
      <div class="line">
        <div class="line-label">Soul</div>
        <div class="line-text">in everything.</div>
      </div>
    </div>
  </div>
  <div class="bot">
    <div class="handle">salttosoul.mv</div>
    <div class="tagline">a journey from doing to being</div>
  </div>
</div></body></html>
